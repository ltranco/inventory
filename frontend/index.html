<html>
<head>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>

<body>
    <h1>Inventory</h1>

        <div class="box" id="green">
            <div class="title">
                green tea
            </div>

                <button class="minus">-</button>
                <div class="count">0</div>
                <button class="plus">+</button>
            </div>
        </div>
        <div class="box" id="black">
            <div class="title">
                black tea
            </div>
            <div class="middle">

                <button class="plus">+</button>
            </div>
        </div>
        <div class="box" id="oolong">
            <div class="title">
                oolong tea
            </div>   
            <div class="middle">
                <button class="minus">-</button>
                <div class="count">0</div>
                <button class="plus">+</button>
            </div>
        </div>
        <div class="box" id="grey">
            <div class="title">
                earl grey tea
            </div> 
            <div class="middle">
                <button class="minus">-</button>
                <div class="count">0</div>
                <button class="plus">+</button>
            </div>
        </div>
    </div>
</body>

</html>
